<h2>Presidents</h2>

<ul>
    <li *ngFor="let president of presidents">
        {{president}}
    </li>
</ul>

<ol>
    @for(pres of presidents; track pres){
        <li>{{pres}}</li> 
    }
</ol>

<ul>
    @for(president of mypresidents; track president.name){ <!--to show list of names and terms -->
        <li>{{president.name}},{{president.term}}</li>
    }
</ul>
